name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Test
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Run unit tests
        run: node test.js

  # Build
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create artifact
        run: echo "Build version 1.0.0 for coffee-order-system" > build_artifact.txt
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: coffee-app-artifact
          path: build_artifact.txt

  # Deploy to staging
  deploy_staging:
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: coffee-app-artifact
      - name: Simulate staging deploy
        run: |
          echo "Деплой у staging-середовище"
          cat build_artifact.txt

  # Verify staging
  verify_staging:
    needs: deploy_staging
    runs-on: ubuntu-latest
    steps:
      - name: Smoke test
        run: |
          echo "Імітація помилки на staging..."
          node -e "process.exit(1);"

  # Deploy to production
  deploy_production:
    needs: verify_staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: coffee-app-artifact
      - name: Final deploy
        run: |
          echo "Розгортання у production середовище..."
          cat build_artifact.txt
